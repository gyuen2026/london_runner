name: london_runner
description: London Runner — smart running coach (Zone 1-2)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  geolocator: ^13.0.2
  health: ^11.1.0
  flutter_tts: ^4.2.0
  permission_handler: ^11.3.1
  flutter_map: ^7.0.2
  google_maps_flutter: ^2.10.0
  latlong2: ^0.9.1
  pointer_interceptor: ^0.10.1+2
  qr_flutter: ^4.1.0
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon_source.png
